<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원 관리 시스템</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f6f9;
      --surface: #fff;
      --surface2: #f0f2f5;
      --border: #dde1e9;
      --border2: #c8cdd8;
      --accent: #4f6ef7;
      --accent-light: #eef1fe;
      --green: #16a34a; --green-light: #dcfce7;
      --blue: #1d4ed8;  --blue-light: #dbeafe;
      --gray-light: #f1f3f6;
      --text: #1a1d27; --text2: #5a6070; --text3: #9aa0b0;
      --red: #dc2626;  --red-light: #fee2e2;
      --yellow: #b45309; --yellow-light: #fef3c7;
      --radius: 10px;
      --shadow: 0 1px 4px rgba(0,0,0,.07);
      --shadow-md: 0 4px 20px rgba(0,0,0,.11);
    }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    /* ── Header ── */
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 1.6rem; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow);
    }
    .logo { font-weight: 700; font-size: .98rem; color: var(--accent); display: flex; align-items: center; gap: 8px; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .chip { font-size: .78rem; color: var(--text2); background: var(--surface2); border: 1px solid var(--border); padding: 4px 12px; border-radius: 20px; white-space: nowrap; }

    /* ── Buttons ── */
    .btn { border: none; border-radius: var(--radius); padding: 8px 14px; font-family: inherit; font-size: .82rem; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; transition: opacity .15s, background .15s; white-space: nowrap; }
    .btn-accent { background: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(79,110,247,.25); }
    .btn-accent:hover { opacity: .88; }
    .btn-outline { background: var(--surface); border: 1px solid var(--border); color: var(--text2); box-shadow: var(--shadow); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text3); }
    .btn-ghost:hover { color: var(--red); border-color: var(--red); background: var(--red-light); }

    /* ── Layout ── */
    .app { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 56px); }

    /* ── Sidebar ── */
    .sidebar { width: 288px; min-width: 288px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .sidebar-top { padding: 12px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }

    .search-wrap { position: relative; }
    .search-wrap input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 12px 8px 32px; font-family: inherit; font-size: .83rem; color: var(--text); outline: none; transition: border-color .2s; }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--text3); }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: .82rem; pointer-events: none; }

    .filter-row { display: flex; gap: 5px; }
    .f-btn { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text2); border-radius: 6px; padding: 5px 2px; font-family: inherit; font-size: .71rem; font-weight: 500; cursor: pointer; transition: all .15s; }
    .f-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .member-list { flex: 1; overflow-y: auto; padding: 8px; }
    .member-list::-webkit-scrollbar { width: 3px; }
    .member-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    .m-card { border-radius: var(--radius); padding: 11px 13px; cursor: pointer; border: 1px solid transparent; transition: all .13s; margin-bottom: 3px; }
    .m-card:hover { background: var(--surface2); border-color: var(--border); }
    .m-card.active { background: var(--accent-light); border-color: var(--accent); }
    .m-card-top { font-weight: 600; font-size: .88rem; display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
    .m-card-sub { font-size: .75rem; color: var(--text2); }

    .badge { font-size: .62rem; padding: 2px 7px; border-radius: 20px; font-weight: 700; letter-spacing: .01em; }
    .b-webcash  { background: var(--blue-light);   color: var(--blue); }
    .b-selfmall { background: var(--green-light);  color: var(--green); }
    .b-etc      { background: var(--gray-light);   color: var(--text2); border: 1px solid var(--border); }

    .empty-msg { text-align: center; color: var(--text3); padding: 2.5rem 1rem; font-size: .83rem; line-height: 2; }

    /* ── Detail ── */
    .detail { flex: 1; overflow-y: auto; padding: 1.6rem 1.8rem; display: flex; flex-direction: column; gap: 1.2rem; }
    .detail::-webkit-scrollbar { width: 3px; }
    .detail::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    .placeholder { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; color: var(--text3); }
    .placeholder-icon { font-size: 3.5rem; opacity: .25; }
    .placeholder-text { font-size: .88rem; line-height: 2; text-align: center; }

    /* Detail sections */
    .d-header { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.3rem 1.5rem; box-shadow: var(--shadow); display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }
    .d-name { font-size: 1.5rem; font-weight: 700; letter-spacing: -.03em; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .d-sub { font-size: .83rem; color: var(--text2); margin-top: 5px; }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .i-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 15px; box-shadow: var(--shadow); }
    .i-card.full { grid-column: 1 / -1; }
    .i-label { font-size: .67rem; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 5px; font-weight: 700; }
    .i-value { font-size: .9rem; color: var(--text); font-weight: 500; line-height: 1.5; word-break: break-all; }

    .sec-title { font-size: .72rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text2); display: flex; align-items: center; gap: 8px; }
    .sec-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Memo */
    .memo-list { display: flex; flex-direction: column; gap: 7px; }
    .memo-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 13px; box-shadow: var(--shadow); }
    .memo-body { font-size: .87rem; line-height: 1.7; margin-bottom: 7px; white-space: pre-wrap; }
    .memo-foot { display: flex; justify-content: space-between; align-items: center; }
    .memo-meta { font-size: .72rem; color: var(--text3); }
    .memo-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: .72rem; padding: 2px 7px; border-radius: 4px; transition: all .13s; }
    .memo-del:hover { color: var(--red); background: var(--red-light); }

    .memo-form { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
    .memo-ta { width: 100%; background: transparent; border: none; padding: 11px 13px; font-family: inherit; font-size: .87rem; color: var(--text); resize: none; outline: none; min-height: 74px; }
    .memo-ta::placeholder { color: var(--text3); }
    .memo-form-foot { display: flex; justify-content: space-between; align-items: center; padding: 7px 11px; border-top: 1px solid var(--border); background: var(--surface2); }
    .author-inp { background: transparent; border: none; color: var(--text2); font-family: inherit; font-size: .79rem; outline: none; width: 150px; }
    .author-inp::placeholder { color: var(--text3); }
    .memo-save-btn { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 6px 14px; font-family: inherit; font-size: .79rem; font-weight: 600; cursor: pointer; }
    .memo-save-btn:hover { opacity: .85; }

    /* ── Upload Modal ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.28); backdrop-filter: blur(4px); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.8rem; width: 100%; max-width: 580px; max-height: 92vh; overflow-y: auto; box-shadow: var(--shadow-md); animation: popUp .2s ease; }
    @keyframes popUp { from { opacity: 0; transform: translateY(14px) scale(.98); } to { opacity: 1; transform: none; } }
    .modal-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 1.2rem; display: flex; align-items: center; justify-content: space-between; }
    .modal-close { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); border-radius: 6px; width: 28px; height: 28px; cursor: pointer; font-size: .88rem; display: flex; align-items: center; justify-content: center; transition: all .13s; }
    .modal-close:hover { background: var(--red-light); color: var(--red); }

    /* Drop zone */
    .drop-zone { border: 2px dashed var(--border2); border-radius: 12px; padding: 2rem 1.5rem; text-align: center; cursor: pointer; transition: all .2s; background: var(--surface); }
    .drop-zone:hover, .drop-zone.over { border-color: var(--accent); background: var(--accent-light); }
    .drop-icon { font-size: 2.4rem; margin-bottom: 8px; }
    .drop-text { font-size: .88rem; color: var(--text2); line-height: 1.8; }
    .drop-sub  { font-size: .76rem; color: var(--text3); margin-top: 4px; }

    /* Preview table */
    .preview-wrap { margin-top: 14px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .preview-info { font-size: .79rem; color: var(--text2); padding: 8px 12px; background: var(--surface2); border-bottom: 1px solid var(--border); }
    .tbl-scroll { max-height: 240px; overflow-y: auto; }
    .tbl-scroll::-webkit-scrollbar { width: 3px; }
    .tbl-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    table { width: 100%; border-collapse: collapse; font-size: .79rem; }
    thead th { background: var(--accent); color: #fff; padding: 8px 10px; text-align: left; font-weight: 600; white-space: nowrap; position: sticky; top: 0; }
    tbody td { padding: 7px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:nth-child(even) td { background: var(--surface2); }

    .modal-foot { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.3rem; }
    .btn-cancel { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); border-radius: var(--radius); padding: 9px 18px; font-family: inherit; font-size: .86rem; cursor: pointer; }
    .btn-confirm { background: var(--accent); border: none; color: #fff; border-radius: var(--radius); padding: 9px 22px; font-family: inherit; font-size: .86rem; font-weight: 700; cursor: pointer; box-shadow: 0 2px 8px rgba(79,110,247,.25); }
    .btn-confirm:disabled { opacity: .4; cursor: not-allowed; }
    .btn-confirm:not(:disabled):hover { opacity: .87; }

    /* Toast */
    .toast { position: fixed; bottom: 1.8rem; right: 1.8rem; border-radius: var(--radius); padding: 10px 18px; font-size: .82rem; z-index: 999; box-shadow: var(--shadow-md); animation: popUp .22s ease; }
    .toast.ok   { background: var(--green-light); border: 1px solid #86efac; color: var(--green); }
    .toast.err  { background: var(--red-light);   border: 1px solid #fca5a5; color: var(--red); }
    .toast.info { background: var(--accent-light); border: 1px solid #a5b4fc; color: var(--accent); }
  </style>
</head>
<body>

<header>
  <div class="logo">👥 회원 관리 시스템</div>
  <div class="header-right">
    <span class="chip" id="count-chip">회원 0명</span>
    <button class="btn btn-outline" onclick="dlTemplate()">⬇️ 템플릿 다운</button>
    <button class="btn btn-accent" onclick="openUpload()">📂 엑셀 업로드</button>
  </div>
</header>

<div class="app">
  <!-- 사이드바 -->
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="q" placeholder="이름, 연락처로 검색..." oninput="renderList()" />
      </div>
      <div class="filter-row">
        <button class="f-btn active" onclick="setFilter('all',this)">전체</button>
        <button class="f-btn" onclick="setFilter('webcash',this)">웹케시</button>
        <button class="f-btn" onclick="setFilter('selfmall',this)">자사몰</button>
        <button class="f-btn" onclick="setFilter('etc',this)">기타</button>
      </div>
    </div>
    <div class="member-list" id="list"></div>
  </div>

  <!-- 상세 -->
  <div class="detail" id="detail">
    <div class="placeholder">
      <div class="placeholder-icon">📊</div>
      <div class="placeholder-text">엑셀 파일을 업로드하면<br/>회원 목록이 표시됩니다</div>
      <button class="btn btn-accent" onclick="openUpload()">📂 엑셀 업로드</button>
    </div>
  </div>
</div>

<!-- 업로드 모달 -->
<div class="modal-overlay" id="upload-modal">
  <div class="modal">
    <div class="modal-title">
      <span>📂 엑셀 업로드</span>
      <button class="modal-close" onclick="closeUpload()">✕</button>
    </div>

    <div class="drop-zone" id="drop-zone"
      ondragover="event.preventDefault();this.classList.add('over')"
      ondragleave="this.classList.remove('over')"
      ondrop="onDrop(event)"
      onclick="document.getElementById('file-inp').click()">
      <div class="drop-icon">📊</div>
      <div class="drop-text">엑셀 파일을 드래그하거나 클릭해서 선택</div>
      <div class="drop-sub">.xlsx / .xls 지원 &nbsp;·&nbsp; 1행: 이름 / 연락처 / 회원구분 / 보내는사람 / 집주소 / 메모</div>
    </div>
    <input type="file" id="file-inp" accept=".xlsx,.xls" style="display:none" onchange="onFileSelect(event)" />

    <div id="preview" style="display:none;">
      <div class="preview-wrap">
        <div class="preview-info" id="preview-info"></div>
        <div class="tbl-scroll">
          <table><thead id="t-head"></thead><tbody id="t-body"></tbody></table>
        </div>
      </div>
    </div>

    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeUpload()">취소</button>
      <button class="btn-confirm" id="confirm-btn" disabled onclick="applyUpload()">✅ 목록 적용</button>
    </div>
  </div>
</div>

<script>
// ─── 상태 ───
let members  = [];   // 엑셀에서 불러온 회원 기본 정보
let memoMap  = {};   // { phone: [ {id,text,author,time}, … ] }  ← localStorage 저장
let sel      = null; // 선택된 회원 phone
let filter   = 'all';
let pending  = [];   // 업로드 미리보기 데이터

const MEMO_KEY = 'memoMap_v1';

// ─── 초기화 ───
function init() {
  try { memoMap = JSON.parse(localStorage.getItem(MEMO_KEY)) || {}; } catch { memoMap = {}; }
}
function saveMemos() { localStorage.setItem(MEMO_KEY, JSON.stringify(memoMap)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ─── 공통 유틸 ───
const TYPE_KO  = { webcash:'웹케시', selfmall:'자사몰', etc:'기타' };
const TYPE_MAP = { '웹케시':'webcash','webcash':'webcash','자사몰':'selfmall','selfmall':'selfmall','기타':'etc','etc':'etc' };
const BADGE    = { webcash:'b-webcash', selfmall:'b-selfmall', etc:'b-etc' };
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ─── 엑셀 파싱 ───
function parseRow(row) {
  const s = k => String(row[k]||'').trim();
  return {
    name    : s('이름'),
    phone   : s('연락처'),
    type    : TYPE_MAP[s('회원구분')] || 'etc',
    sender  : s('보내는사람'),
    address : s('집주소'),
    memo    : s('메모'),
  };
}

async function readExcel(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type:'binary' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        res(XLSX.utils.sheet_to_json(ws, { defval:'' }));
      } catch(e){ rej(e); }
    };
    r.onerror = rej;
    r.readAsBinaryString(file);
  });
}

// ─── 업로드 UI ───
function openUpload() {
  pending = [];
  document.getElementById('preview').style.display = 'none';
  document.getElementById('file-inp').value = '';
  document.getElementById('confirm-btn').disabled = true;
  document.getElementById('drop-zone').classList.remove('over');
  document.getElementById('upload-modal').classList.add('open');
}
function closeUpload() { document.getElementById('upload-modal').classList.remove('open'); }
document.getElementById('upload-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeUpload(); });

function onDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f) processFile(f);
}
function onFileSelect(e) { if (e.target.files[0]) processFile(e.target.files[0]); }

async function processFile(file) {
  if (!/\.(xlsx|xls)$/i.test(file.name)) { toast('엑셀 파일만 지원합니다', 'err'); return; }
  toast('파일 읽는 중…', 'info');
  try {
    const raw = await readExcel(file);
    pending = raw.map(parseRow).filter(r => r.name && r.phone);
    renderPreview(pending);
    document.getElementById('confirm-btn').disabled = pending.length === 0;
  } catch(e) { toast('파일 읽기 실패: ' + e.message, 'err'); }
}

function renderPreview(rows) {
  document.getElementById('preview').style.display = 'block';
  document.getElementById('preview-info').textContent = `총 ${rows.length}명 인식됨 (최대 50행 미리보기)`;
  document.getElementById('t-head').innerHTML =
    `<tr>${['이름','연락처','회원구분','보내는사람','집주소'].map(c=>`<th>${c}</th>`).join('')}</tr>`;
  document.getElementById('t-body').innerHTML = rows.slice(0,50).map(r => `
    <tr>
      <td>${esc(r.name)}</td>
      <td>${esc(r.phone)}</td>
      <td><span class="badge ${BADGE[r.type]}">${TYPE_KO[r.type]}</span></td>
      <td>${esc(r.sender)}</td>
      <td>${esc(r.address)}</td>
    </tr>`).join('');
}

function applyUpload() {
  const existing = new Set(members.map(m => m.phone));
  const newOnes  = pending.filter(r => !existing.has(r.phone));
  members = [...members, ...newOnes];
  if (!sel && members.length) sel = members[0].phone;
  closeUpload();
  renderList();
  renderDetail();
  const skipped = pending.length - newOnes.length;
  const msg = skipped > 0
    ? `${newOnes.length}명 추가 (중복 ${skipped}명 제외)`
    : `${newOnes.length}명이 추가되었습니다`;
  toast(msg, 'ok');
}

// ─── 템플릿 다운 ───
function dlTemplate() {
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet([
    ['이름','연락처','회원구분','보내는사람','집주소','메모'],
    ['홍길동','010-1234-5678','웹케시','홍길동','서울시 강남구 테헤란로 123','단골 고객'],
    ['김영희','010-9876-5432','자사몰','김영희','경기도 성남시 분당구 정자동 45',''],
    ['박철수','010-5555-7777','기타','박철수','부산시 해운대구 센텀로 10','신규'],
  ]);
  ws['!cols'] = [{wch:12},{wch:18},{wch:10},{wch:14},{wch:36},{wch:24}];
  XLSX.utils.book_append_sheet(wb, ws, '회원목록');

  const ws2 = XLSX.utils.aoa_to_sheet([
    ['📋 작성 안내'],[''],
    ['A열 - 이름 (필수)'],
    ['B열 - 연락처 (필수) : 010-0000-0000'],
    ['C열 - 회원구분 : 웹케시 / 자사몰 / 기타'],
    ['D열 - 보내는사람'],
    ['E열 - 집주소 (한 줄)'],
    ['F열 - 메모'],[''],
    ['⚠ 1행(헤더)은 수정하지 마세요'],
    ['⚠ 이름과 연락처는 필수 입력입니다'],
  ]);
  ws2['!cols'] = [{wch:48}];
  XLSX.utils.book_append_sheet(wb, ws2, '작성안내');
  XLSX.writeFile(wb, '회원목록_템플릿.xlsx');
  toast('템플릿이 다운로드되었습니다', 'ok');
}

// ─── 목록 렌더링 ───
function renderList() {
  const q  = document.getElementById('q').value.toLowerCase();
  const el = document.getElementById('list');
  const filtered = members.filter(m =>
    (filter === 'all' || m.type === filter) &&
    (!q || m.name.includes(q) || m.phone.includes(q))
  );
  document.getElementById('count-chip').textContent = `회원 ${members.length}명`;

  if (!filtered.length) {
    el.innerHTML = `<div class="empty-msg">${members.length === 0
      ? '엑셀을 업로드하면<br/>회원 목록이 표시됩니다'
      : '검색 결과가 없습니다'}</div>`;
    return;
  }
  el.innerHTML = filtered.map(m => `
    <div class="m-card ${m.phone === sel ? 'active' : ''}" onclick="selectMember('${m.phone}')">
      <div class="m-card-top">
        ${esc(m.name)}
        <span class="badge ${BADGE[m.type]}">${TYPE_KO[m.type]}</span>
      </div>
      <div class="m-card-sub">${esc(m.phone)}</div>
    </div>`).join('');
}

// ─── 상세 렌더링 ───
function selectMember(phone) { sel = phone; renderList(); renderDetail(); }

function renderDetail() {
  const panel = document.getElementById('detail');
  if (!sel) {
    panel.innerHTML = `<div class="placeholder"><div class="placeholder-icon">👥</div><div class="placeholder-text">회원을 선택하세요</div></div>`;
    return;
  }
  const m = members.find(x => x.phone === sel);
  if (!m) return;
  const memos = memoMap[m.phone] || [];

  panel.innerHTML = `
    <div class="d-header">
      <div>
        <div class="d-name">${esc(m.name)} <span class="badge ${BADGE[m.type]}">${TYPE_KO[m.type]}</span></div>
        <div class="d-sub">📞 ${esc(m.phone)}</div>
      </div>
    </div>

    <div class="info-grid">
      <div class="i-card">
        <div class="i-label">보내는사람</div>
        <div class="i-value">${esc(m.sender) || '—'}</div>
      </div>
      <div class="i-card">
        <div class="i-label">회원구분</div>
        <div class="i-value">${TYPE_KO[m.type]}</div>
      </div>
      <div class="i-card full">
        <div class="i-label">집주소</div>
        <div class="i-value">${esc(m.address) || '—'}</div>
      </div>
      ${m.memo ? `
      <div class="i-card full">
        <div class="i-label">엑셀 메모</div>
        <div class="i-value">${esc(m.memo)}</div>
      </div>` : ''}
    </div>

    <div class="sec-title">📝 메모 기록</div>

    <div class="memo-list">
      ${memos.length
        ? memos.map(memo => `
          <div class="memo-item">
            <div class="memo-body">${esc(memo.text)}</div>
            <div class="memo-foot">
              <span class="memo-meta">✍️ ${esc(memo.author)} · ${memo.time}</span>
              <button class="memo-del" onclick="delMemo('${m.phone}','${memo.id}')">삭제</button>
            </div>
          </div>`).join('')
        : `<div style="color:var(--text3);font-size:.83rem;padding:4px 2px;">메모가 없습니다</div>`}
    </div>

    <div class="memo-form">
      <textarea class="memo-ta" id="memo-ta" placeholder="메모를 입력하세요…"></textarea>
      <div class="memo-form-foot">
        <input class="author-inp" id="author-inp" placeholder="작성자 이름" />
        <button class="memo-save-btn" onclick="addMemo('${m.phone}')">저장</button>
      </div>
    </div>
  `;
}

// ─── 메모 ───
function addMemo(phone) {
  const text   = document.getElementById('memo-ta').value.trim();
  const author = document.getElementById('author-inp').value.trim() || '익명';
  if (!text) { toast('메모를 입력하세요', 'err'); return; }
  if (!memoMap[phone]) memoMap[phone] = [];
  const now = new Date();
  const p   = n => String(n).padStart(2,'0');
  memoMap[phone].unshift({
    id: uid(), text, author,
    time: `${now.getFullYear()}-${p(now.getMonth()+1)}-${p(now.getDate())} ${p(now.getHours())}:${p(now.getMinutes())}`
  });
  saveMemos();
  renderDetail();
  toast('메모가 저장되었습니다', 'ok');
}

function delMemo(phone, id) {
  if (!memoMap[phone]) return;
  memoMap[phone] = memoMap[phone].filter(m => m.id !== id);
  saveMemos();
  renderDetail();
}

// ─── 필터 ───
function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

// ─── 토스트 ───
function toast(msg, type='ok') {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2800);
}

// ─── 시작 ───
init();
renderList();
</script>
</body>
</html>
